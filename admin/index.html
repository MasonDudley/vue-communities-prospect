<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin Login — VUE Communities</title>
    <link rel="icon" href="/assets/images/vue-logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <main class="login-page">
      <div class="login-card">
        <div class="login-card__brand">
          <img src="/assets/images/vue-logo.png" alt="VUE Communities" />
          <h1>Admin Portal</h1>
          <p>Sign in to manage inquiries and availability.</p>
        </div>

        <div id="login-error" role="alert"></div>

        <form class="login-form" id="login-form" novalidate>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="password-field">
            <label for="password">Password</label>
            <div class="password-input-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
              <button type="button" class="password-toggle" id="password-toggle" aria-label="Show password">
                <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <button class="btn btn-primary" type="submit" id="login-btn">Sign in</button>
        </form>
      </div>
    </main>

    <script>
      // Password toggle
      document.getElementById('password-toggle').addEventListener('click', () => {
        const input = document.getElementById('password');
        const btn = document.getElementById('password-toggle');
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
        btn.querySelector('.eye-open').style.display = isPassword ? 'none' : '';
        btn.querySelector('.eye-closed').style.display = isPassword ? '' : 'none';
      });
    </script>
    <script type="module">
      import { supabase } from '/admin/admin.js';

      // Redirect to dashboard if already authenticated
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.replace('/admin/dashboard/');
      }

      const form = document.getElementById('login-form');
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.className = '';
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        const email = form.email.value.trim();
        const password = form.password.value;

        const { error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
          errorEl.textContent = error.message === 'Invalid login credentials'
            ? 'Invalid email or password.'
            : error.message;
          errorEl.className = 'is-visible';
          btn.disabled = false;
          btn.textContent = 'Sign in';
        } else {
          window.location.replace('/admin/dashboard/');
        }
      });
    </script>
  </body>
</html>
